name: .Deploys

on:
  workflow_call:
    inputs:
      environment:
        description: GitHub environment; e.g. PR number (omit), TEST or PROD
        required: false
        type: string
      tag:
        description: Image tag; e.g. PR number or latest
        default: ${{ github.event.number }}
        required: false
        type: string
      target:
        description: Deployment target; e.g. PR number (omit), test or prod
        default: ${{ github.event.number }}
        required: false
        type: string

jobs:
  init:
    name: Initialize
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    steps:
      - name: Initialize
        uses: bcgov/action-deployer-openshift@v4.0.0
        with:
          oc_namespace: ${{ vars.OC_NAMESPACE }}
          oc_server: ${{ vars.OC_SERVER }}
          oc_token: ${{ secrets.OC_TOKEN }}
          file: common/openshift.init.yml
          overwrite: true
          parameters:
            -p TARGET=${{ inputs.target }} -p POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} -p
            POSTGRES_USER=${{ secrets.POSTGRES_USER }} -p POSTGRES_HOST=${{ vars.POSTGRES_HOST }} -p
            POSTGRES_DATABASE=${{ vars.POSTGRES_DATABASE }}

  database:
    name: Database
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy Database
        uses: bcgov-nr/action-deployer-openshift@v4.0.0
        with:
          oc_namespace: ${{ vars.OC_NAMESPACE }}
          oc_server: ${{ vars.OC_SERVER }}
          oc_token: ${{ secrets.OC_TOKEN }}
          file: database/openshift.deploy.yml
          overwrite: false
          parameters: -p TAG=${{ inputs.tag }} -p TARGET=${{ inputs.target }}

  backend:
    name: Backend
    needs: [database]
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy Backend
        uses: bcgov-nr/action-deployer-openshift@v4.0.0
        with:
          oc_namespace: ${{ vars.OC_NAMESPACE }}
          oc_server: ${{ vars.OC_SERVER }}
          oc_token: ${{ secrets.OC_TOKEN }}
          file: backend/openshift.deploy.yml
          overwrite: true
          parameters:
            -p TAG=${{ inputs.tag }} -p TARGET=${{ inputs.target }} -p POSTGRES_PASSWORD=${{
            secrets.POSTGRES_PASSWORD }}
          verification_path: /api/health
          verification_retry_attempts: '5'
          verification_retry_seconds: '15'

  frontend:
    name: Frontend
    needs: [backend]
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    steps:
      - name: Deploy Frontend
        uses: bcgov-nr/action-deployer-openshift@v4.0.0
        with:
          oc_namespace: ${{ vars.OC_NAMESPACE }}
          oc_server: ${{ vars.OC_SERVER }}
          oc_token: ${{ secrets.OC_TOKEN }}
          file: frontend/openshift.deploy.yml
          overwrite: true
          parameters: -p TAG=${{ inputs.tag }} -p TARGET=${{ inputs.target }}
